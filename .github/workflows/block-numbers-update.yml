name: Block Numbers Update

on:
  workflow_dispatch:

jobs:
  update-block-numbers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Update block numbers
        run: npm run update-block-numbers

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update block numbers"
          branch: block-numbers-bump
          delete-branch: true
          title: "chore: update block numbers"
          body: |
            This PR updates the block numbers across networks.

            Auto-generated by the block-numbers-bump workflow.
          labels: automated
